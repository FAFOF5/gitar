<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الكتابة والنطق مع الترجمة التفاعلية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 700px;
            width: 95%;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn-speak { background-color: #3498db; color: white; }
        .btn-reset { background-color: #e74c3c; color: white; }
        button:hover { opacity: 0.9; transform: scale(1.05); }

        #display-area {
            margin: 25px 0;
            text-align: left;
            direction: ltr;
        }

        .word-container {
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 15px;
            text-align: center;
            vertical-align: top;
        }

        .eng-word {
            font-size: 28px;
            display: block;
            color: #d1d1d1; /* لون باهت للكلمة الإنجليزية */
            letter-spacing: 1px;
        }

        .arb-word {
            font-size: 16px;
            display: block;
            color: #e0e0e0; /* لون باهت للترجمة */
            direction: rtl;
            margin-top: 5px;
            transition: color 0.3s;
        }

        /* تنسيقات الحالة */
        .correct { color: #2ecc71 !important; font-weight: bold; }
        .active-arb { color: #e67e22 !important; font-weight: bold; } /* لون الترجمة عند الكتابة */
        .current-letter { border-bottom: 3px solid #f1c40f; color: #333; }

        #hidden-input { position: fixed; top: -100px; opacity: 0; }
        
        .instructions { 
            color: #7f8c8d; 
            font-size: 0.9rem; 
            margin-top: 15px; 
            border-top: 1px solid #eee; 
            padding-top: 10px;
            direction: rtl;
        }
    </style>
</head>
<body onclick="document.getElementById('hidden-input').focus()">

<div class="container">
    <h2 style="direction: rtl;">تحدي الحفظ والترجمة الذكية 🎧</h2>
    
    <div class="controls">
        <button class="btn-speak" onclick="readFullText()">🔊 نطق النص كاملاً</button>
        <button class="btn-reset" onclick="resetGame()">🔄 إعادة</button>
    </div>

    <input type="text" id="hidden-input" autocomplete="off" autofocus>

    <div id="display-area"></div>
    
    <p class="instructions">
        اكتب الحروف بالترتيب. عند إنهاء كل كلمة سيتم نطقها مرتين وتلوين ترجمتها العربية.
    </p>
</div>

<script>
    // النص الجديد المطلوب مع ترجمته
    const data = [
        { eng: "I", arb: "أنا" },
        { eng: "like", arb: "أحب" },
        { eng: "my", arb: "لي/الخاص بي" },
        { eng: "free", arb: "وقت" },
        { eng: "time.", arb: "فراغي" },
        { eng: "I", arb: "أنا" },
        { eng: "watch", arb: "أشاهد" },
        { eng: "TV", arb: "التلفاز" },
        { eng: "and", arb: "و" },
        { eng: "play", arb: "ألعب" },
        { eng: "football.", arb: "كرة القدم" },
        { eng: "I", arb: "أنا" },
        { eng: "go", arb: "أذهب" },
        { eng: "to", arb: "إلى" },
        { eng: "the", arb: "الـ" },
        { eng: "school", arb: "المدرسة" },
        { eng: "with", arb: "مع" },
        { eng: "my", arb: "أصدقائي" },
        { eng: "friends.", arb: "أصدقائي" },
        { eng: "I", arb: "أنا" },
        { eng: "am", arb: "أكون" },
        { eng: "happy.", arb: "سعيد" }
    ];

    const fullText = data.map(item => item.eng).join(' ');
    const displayArea = document.getElementById('display-area');
    const inputElement = document.getElementById('hidden-input');
    
    let currentGlobalIndex = 0;

    function init() {
        displayArea.innerHTML = '';
        let charCounter = 0;

        data.forEach((item, wordIdx) => {
            const wordContainer = document.createElement('div');
            wordContainer.className = 'word-container';
            wordContainer.id = `word-cont-${wordIdx}`;

            const engSpan = document.createElement('span');
            engSpan.className = 'eng-word';
            
            // تقسيم الكلمة لأحرف
            item.eng.split('').forEach(char => {
                const charSpan = document.createElement('span');
                charSpan.innerText = char;
                charSpan.id = `char-${charCounter}`;
                engSpan.appendChild(charSpan);
                charCounter++;
            });

            // إضافة مسافة خفية بعد الكلمة (باستثناء الكلمة الأخيرة)
            if (wordIdx < data.length - 1) {
                const spaceSpan = document.createElement('span');
                spaceSpan.innerText = ' ';
                spaceSpan.id = `char-${charCounter}`;
                engSpan.appendChild(spaceSpan);
                charCounter++;
            }

            const arbSpan = document.createElement('span');
            arbSpan.className = 'arb-word';
            arbSpan.innerText = item.arb;
            arbSpan.id = `arb-${wordIdx}`;

            wordContainer.appendChild(engSpan);
            wordContainer.appendChild(arbSpan);
            displayArea.appendChild(wordContainer);
        });
        updateHighlight();
    }

    function updateHighlight() {
        document.querySelectorAll('.eng-word span').forEach(s => s.classList.remove('current-letter'));
        if (currentGlobalIndex < fullText.length) {
            document.getElementById(`char-${currentGlobalIndex}`).classList.add('current-letter');
        }
    }

    function speak(textToSay, rate = 0.8, repeat = 1) {
        window.speechSynthesis.cancel();
        for (let i = 0; i < repeat; i++) {
            const utterance = new SpeechSynthesisUtterance(textToSay);
            utterance.lang = 'en-US';
            utterance.rate = rate;
            window.speechSynthesis.speak(utterance);
        }
    }

    function readFullText() {
        speak(fullText, 0.6, 1);
    }

    inputElement.addEventListener('input', (e) => {
        const charTyped = e.data;
        if (!charTyped || currentGlobalIndex >= fullText.length) return;

        const targetChar = fullText[currentGlobalIndex];

        if (charTyped.toLowerCase() === targetChar.toLowerCase()) {
            document.getElementById(`char-${currentGlobalIndex}`).classList.add('correct');
            currentGlobalIndex++;

            // التحقق من اكتمال كلمة لنطقها وتلوين ترجمتها
            if (currentGlobalIndex === fullText.length || fullText[currentGlobalIndex] === ' ') {
                const wordsSoFar = fullText.substring(0, currentGlobalIndex).trim().split(' ');
                const lastWord = wordsSoFar[wordsSoFar.length - 1].replace(/[.,]/g, "");
                const currentWordIdx = wordsSoFar.length - 1;
                
                // تلوين الترجمة العربية
                document.getElementById(`arb-${currentWordIdx}`).classList.add('active-arb');
                
                // نطق الكلمة
                setTimeout(() => speak(lastWord, 0.8, 2), 50);
            }

            updateHighlight();
        }
        inputElement.value = '';
    });

    function resetGame() {
        window.speechSynthesis.cancel();
        currentGlobalIndex = 0;
        init();
        inputElement.focus();
    }

    init();
    window.onload = () => setTimeout(() => inputElement.focus(), 500);
</script>

</body>
</html>
